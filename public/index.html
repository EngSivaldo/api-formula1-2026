<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>F1 Drivers Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
border:none;
}

.table{
color:white;
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">🏎️ F1 Drivers Manager</h1>

<div class="row mb-4">

<div class="col-md-4">

<input id="search" class="form-control" placeholder="Buscar piloto...">

</div>

<div class="col-md-2">

<button onclick="sortDrivers()" class="btn btn-warning w-100">
Ordenar Pontos
</button>

</div>

</div>


<div class="row">

<div class="col-md-4">

<div class="card p-4">

<h4>Criar Piloto</h4>

<input id="name" class="form-control mb-2" placeholder="Nome">

<input id="team" class="form-control mb-2" placeholder="Equipe">

<input id="points" class="form-control mb-3" placeholder="Pontos">

<button onclick="createDriver()" class="btn btn-success w-100">
Criar
</button>

</div>

</div>


<div class="col-md-8">

<div class="card p-4">

<h4 class="mb-3">Pilotos</h4>

<table class="table table-dark table-hover">

<thead>

<tr>
<th>Nome</th>
<th>Equipe</th>
<th>Pontos</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="drivers">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
