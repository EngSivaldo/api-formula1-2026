<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>F1 Drivers Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
border:none;
}

.table{
color:white;
}

.medal{
font-size:20px;
}

.gold{color:gold;}
.silver{color:silver;}
.bronze{color:#cd7f32;}

.progress{
height:8px;
}

td button{
min-width:90px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">🏎️ F1 Drivers Dashboard</h1>

<div class="d-flex justify-content-between mb-4">

<input id="search" class="form-control w-25" placeholder="Buscar piloto...">

<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createModal">
➕ Novo Piloto
</button>

</div>


<div class="card p-4">

<h4 class="mb-3">Ranking</h4>

<table class="table table-dark table-hover">

<thead>
<tr>
<th>Posição</th>
<th>Piloto</th>
<th>Equipe</th>
<th>Pontos</th>
<th width="200">Progresso</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="drivers"></tbody>

</table>

</div>

</div>


<!-- MODAL CRIAR -->

<div class="modal fade" id="createModal">

<div class="modal-dialog">

<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>Criar Piloto</h5>
</div>

<div class="modal-body">

<input id="name" class="form-control mb-2" placeholder="Nome">
<input id="team" class="form-control mb-2" placeholder="Equipe">
<input id="points" type="number" class="form-control" placeholder="Pontos">

</div>

<div class="modal-footer">

<button class="btn btn-success" onclick="createDriver()">
Criar
</button>

</div>

</div>

</div>

</div>


<!-- MODAL EDITAR -->

<div class="modal fade" id="editModal">

<div class="modal-dialog">

<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>Editar Piloto</h5>
</div>

<div class="modal-body">

<input id="editName" class="form-control mb-2">
<input id="editTeam" class="form-control mb-2">
<input id="editPoints" type="number" class="form-control">

</div>

<div class="modal-footer">

<button class="btn btn-primary" onclick="updateDriver()">
Salvar
</button>

</div>

</div>

</div>

</div>


<!-- MODAL DELETE -->

<div class="modal fade" id="deleteModal">

<div class="modal-dialog">

<div class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>Confirmar Exclusão</h5>
</div>

<div class="modal-body">

<p>Deseja realmente deletar este piloto?</p>

<ul>
<li><strong>Nome:</strong> <span id="deleteName"></span></li>
<li><strong>Equipe:</strong> <span id="deleteTeam"></span></li>
<li><strong>Pontos:</strong> <span id="deletePoints"></span></li>
</ul>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Cancelar
</button>

<button class="btn btn-danger" onclick="confirmDelete()">
Deletar
</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
